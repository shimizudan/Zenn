title: "東京大学の入試数学とJulia言語"
summary: "2026年の東京大学理科（理系）の数学の問題をJulia言語を用いて考えたり，解いてみました。数学の入試問題と言うのは，当然頭の中で考えて計算で解く必要があります。コンピューターを使って解くわけにはいきません。ですが，こういったツールを用いて考えたときにどのように考えるのか，また答えについてもどのように確認するのかというのは，自分の知見を与えてくれます。難しかった2026年度の問題を題材に，Julia言語を使うとどのように考えられるか，また確認できるかをまとめました。"
